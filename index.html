<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Атака Титанов RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>⚔️ АТАКА ТИТАНОВ RPG</h1>
        <p>Python бэкенд + Онлайн чат</p>
    </div>
    
    <div class="stats-panel" id="statsPanel">
        <span class="stat">👤 Создайте персонажа</span>
    </div>
    
    <div class="messages" id="messages">
        <div class="message msg-system">🎮 Добро пожаловать в игру!</div>
        <div class="message msg-system">Введите имя вашего бойца и нажмите Enter:</div>
    </div>
    
    <div class="buttons-panel" id="buttonsPanel">
        <div class="button-grid"></div>
    </div>
    
    <div class="input-area">
        <input type="text" class="game-input" id="gameInput" placeholder="Введите имя..." autocomplete="off">
    </div>
</div>

<!-- Окно чата -->
<div class="chat-window" id="chatWindow">
    <div class="chat-header" onclick="toggleChat()">
        💬 Чат игроков <span id="chatOnlineCount">0</span>
        <span style="float:right">▼</span>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-message system">💬 Подключение к чату...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Введите сообщение..." maxlength="100">
        <button class="chat-send" onclick="sendChatMessage()">📤</button>
    </div>
</div>

<script src="static/script.js"></script>
</body>
</html>
