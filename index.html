<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Атака Титанов RPG</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .game-header {
            background: linear-gradient(135deg, #2c2c3e, #1a1a2e);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        .game-header h1 { color: #ffd700; margin: 0; font-size: 1.4rem; }
        .game-header p { color: #aaa; margin: 5px 0 0; font-size: 0.7rem; }
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            justify-content: space-around;
            border-bottom: 1px solid #333;
        }
        .stat { background: #2c2c3e; padding: 5px 10px; border-radius: 20px; color: #ffd700; font-size: 0.75rem; }
        .messages {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            font-size: 0.85rem;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-system { background: #2c2c3e; color: #ddd; border-left: 3px solid #ffd700; }
        .msg-combat { background: #3e2c2c; color: #ffaa88; border-left: 3px solid #ff4444; }
        .msg-victory { background: #2c3e2c; color: #88ff88; border-left: 3px solid #44ff44; }
        .msg-error { background: #3e2c2c; color: #ff8888; border-left: 3px solid #ff4444; }
        .buttons-panel {
            padding: 15px;
            background: #1a1a2e;
            border-top: 1px solid #333;
            max-height: 200px;
            overflow-y: auto;
        }
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .game-btn {
            background: linear-gradient(135deg, #2c2c3e, #1a1a2e);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 8px 12px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .game-btn:hover { background: #ffd700; color: #1a1a2e; transform: scale(1.02); }
        .game-btn:active { transform: scale(0.98); }
        .btn-danger { border-color: #ff4444; color: #ff8888; }
        .btn-warning { border-color: #ffaa44; color: #ffaa44; }
        .input-area {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #0f0f1a;
            border-top: 1px solid #333;
        }
        .game-input {
            flex: 1;
            background: #2c2c3e;
            border: 1px solid #ffd700;
            padding: 10px;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
        }
        .game-input:focus { outline: none; border-color: #ffaa00; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 5px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>⚔️ АТАКА ТИТАНОВ RPG</h1>
        <p>Python бэкенд на Render.com</p>
    </div>
    
    <div class="stats-panel" id="statsPanel">
        <span class="stat">👤 Создайте персонажа</span>
    </div>
    
    <div class="messages" id="messages">
        <div class="message msg-system">🎮 Добро пожаловать в игру!</div>
        <div class="message msg-system">Введите имя вашего бойца и нажмите Enter:</div>
    </div>
    
    <div class="buttons-panel" id="buttonsPanel">
        <div class="button-grid"></div>
    </div>
    
    <div class="input-area">
        <input type="text" class="game-input" id="gameInput" placeholder="Введите имя..." autocomplete="off">
    </div>
</div>

<script src="static/script.js"></script>
</body>
</html>
